<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROFILE</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                  url('profile.png') no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      border-radius: 12px;
      width: 350px;
      text-align: center;
      padding: 20px;
      
    }

    .profile-pic {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .profile-pic:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
    }

    h2 {
      margin: 10px 0 5px;
      font-size: 22px;
      color: white;
    }

    p {
      margin: 5px 0;
      font-size: 14px;
      color: white;
    }

    .social-icons {
      margin: 15px 0;
    }

    .social-icons a {
      margin: 0 8px;
      text-decoration: none;
      font-size: 22px;
      color: white;
      transition: color 0.3s;
    }

    .social-icons a:hover {
      color: #ff3333; 
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .links a {
      display: block;
      padding: 12px;
      background: linear-gradient(45deg, maroon, red);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .links a:hover {
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(255,0,0,0.8);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #ccc;
    }

    /* Typewriter slogan */
    .slogan {
      margin-top: 15px;
      color: #ffcccc;
      font-size: 16px;
      font-weight: bold;
      overflow: hidden;
      border-right: .15em solid red;
      white-space: nowrap;
      animation: typing 4s steps(40, end), blink-caret .75s step-end infinite;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }

    @keyframes blink-caret {
      from, to { border-color: transparent }
      50% { border-color: red }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="owa.png" alt="Profile Picture" class="profile-pic">
    <h2>JOSHUA F. DELA CRUZ</h2>
    <p>ICT TRIBE OF THE CONQUERORS COMMITTEE</p>
    <p>NOW RUNNING FOR THE P.R.O POSITION</p>

    <div class="slogan">BIDATECH PARTYLIST</div>

    <div class="social-icons">
      <a href="https://www.facebook.com/share/1CDWoHJmuU/"><i class="fab fa-facebook"></i></a>
    </div>

    <div class="links">
      <a href="https://www.facebook.com/share/1CDWoHJmuU/">Facebook</a>
    </div>

    <div class="footer">Vote wisely • Support ICT Tribe</div>
  </div>

  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
