<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROFILE</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                  url('profile.png') no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      border-radius: 12px;
      width: 350px;
      text-align: center;
      padding: 20px;
    }

    .profile-pic {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
    }

    h2 {
      margin: 10px 0 5px;
      font-size: 22px;
      color: white;
    }

    p {
      margin: 5px 0;
      font-size: 14px;
      color: white;
    }

    .social-icons {
      margin: 15px 0;
    }

    .social-icons a {
      margin: 0 8px;
      text-decoration: none;
      font-size: 20px;
      color: white;
      transition: color 0.3s;
    }

    .social-icons a:hover {
      color: #0077b5; 
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .links a {
      display: block;
      padding: 12px;
      background: maroon;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: background 0.3s;
    }

    .links a:hover {
      background: red;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="ICT.png" alt="Profile Picture" class="profile-pic">
    <h2>JOSHUA F. DELA CRUZ</h2>
    <p>ICT TRIBE OF THE CONQUERORS COMMITTEE</p>
    <p>NOW RUNNING FOR THE P.R.O POSITION</p>

    <div class="social-icons">
      <a href="https://www.facebook.com/share/1aNpucbzhY/"><i class="fab fa-facebook"></i></a>
    </div>

    <div class="links">
      <a href="https://www.facebook.com/share/1aNpucbzhY/">Facebook</a>
    </div>
  </div>

  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
